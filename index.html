<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Торговый дом Импульс | Опт</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col">

    <header class="p-8 border-b border-gray-800 bg-slate-900/80 backdrop-blur-sm">
        <div class="container mx-auto text-center">
            <h1 class="text-5xl font-extrabold text-white">
                Торговый дом Импульс
            </h1>
            <p class="text-lg text-white/90 mt-4 tracking-wide">Прямые дилеры АО «Росхим» | Крупный опт от 20 тонн</p>
        </div>
    </header>

    <main class="container mx-auto p-6 flex-grow">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <div class="bg-gray-800/50 backdrop-blur rounded-2xl border border-gray-700 hover:border-blue-500 transition-all duration-300 overflow-hidden group">
                <img src="natr.jpg" alt="Натр едкий" class="w-full h-40 object-cover opacity-80 group-hover:opacity-100 transition">
                <div class="p-5">
                    <h3 class="font-bold text-lg leading-tight break-words group-hover:text-blue-400 transition">Натр едкий чешуированный</h3>
                </div>
            </div>

            <div class="bg-gray-800/50 backdrop-blur rounded-2xl border border-gray-700 hover:border-blue-500 transition-all duration-300 overflow-hidden group">
                <img src="kisloroda.jpg" alt="Кислота соляная" class="w-full h-40 object-cover opacity-80 group-hover:opacity-100 transition" onerror="this.src='https://placehold.co/400x300?text=Нет+фото'">
                <div class="p-5">
                    <h3 class="font-bold text-lg leading-tight break-words group-hover:text-blue-400 transition">Кислота соляная</h3>
                </div>
            </div>

            <div class="bg-gray-800/50 backdrop-blur rounded-2xl border border-gray-700 hover:border-blue-500 transition-all duration-300 overflow-hidden group">
                <img src="gipohlorit.jpg" alt="Гипохлорит натрия" class="w-full h-40 object-cover opacity-80 group-hover:opacity-100 transition" onerror="this.src='https://placehold.co/400x300?text=Нет+фото'">
                <div class="p-5">
                    <h3 class="font-bold text-lg leading-tight break-words group-hover:text-blue-400 transition">Гипохлорит натрия</h3>
                </div>
            </div>

            <div class="bg-gray-800/50 backdrop-blur rounded-2xl border border-gray-700 hover:border-blue-500 transition-all duration-300 overflow-hidden group">
                <img src="soda.jpg" alt="Сода кальцинированная" class="w-full h-40 object-cover opacity-80 group-hover:opacity-100 transition" onerror="this.src='https://placehold.co/400x300?text=Нет+фото'">
                <div class="p-5">
                    <h3 class="font-bold text-lg leading-tight break-words group-hover:text-blue-400 transition">Сода кальцинированная</h3>
                </div>
            </div>
        </div>

        <div class="mt-12 text-center">
            <a href="catalog.html" class="inline-block px-8 py-4 bg-blue-600 ...">
			Каталог поставляемой продукции
			</a>		
        </div>
    </main>

    <footer class="text-center p-8 text-gray-600 border-t border-gray-800">
        &copy; 2026 ООО «Торговый дом Импульс».
    </footer>
</body>
</html>
