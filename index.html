<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Торговый дом Импульс | Опт</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; position: relative; }
        .bg-fixed-img {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('bg.webp');
            background-size: cover; background-position: center;
            opacity: 0.15; z-index: -1;
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col">

    <div class="bg-fixed-img"></div>

    <!-- Адаптивная верхняя панель -->
    <nav class="container mx-auto p-6 flex flex-col sm:flex-row justify-between items-center gap-4 text-xs sm:text-sm text-gray-400">
        <div class="flex flex-col sm:flex-row gap-2 sm:gap-6 text-center sm:text-left">
            <span>тел: +7 (937) 500-66-95</span>
            <span>impulse.chem@gmail.com</span>
        </div>
        <a href="about.html" class="hover:text-blue-400 transition bg-white/5 px-4 py-1 rounded-full">О компании</a>
    </nav>

    <!-- Заголовок: адаптивный размер текста -->
    <header class="p-6 sm:p-8 border-t-2 border-black border-b border-white/80 bg-black/40 backdrop-blur-md">
        <div class="container mx-auto text-center">
            <h1 class="text-3xl sm:text-5xl font-extrabold text-white">Торговый дом Импульс</h1>
            <p class="text-sm sm:text-lg text-white/90 mt-2 tracking-wide">Прямые дилеры АО «Росхим» | Крупный опт от 20 тонн</p>
        </div>
    </header>

    <main class="container mx-auto p-4 sm:p-6 flex-grow">
        <!-- Сетка карточек -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-6">
            
            <!-- Карточка товара (повторите структуру для других) -->
            <a href="natrCHTR.html" class="block bg-gradient-to-b from-white/10 to-black/30 backdrop-blur-sm rounded-2xl border border-white/10 hover:border-sky-300 transition-all duration-300 overflow-hidden relative group">
                <div class="aspect-square flex items-center justify-center p-4">
                    <img src="natr.png" alt="Натр едкий" class="w-full h-full object-contain group-hover:scale-105 transition-transform duration-500">
                </div>
                <div class="p-4 text-center">
                    <h3 class="font-bold text-base sm:text-lg text-white group-hover:text-blue-200 transition-colors">Натр едкий чешуированный</h3>
                </div>
            </a>
            
           <!-- Карточка 2: Кислота соляная -->
			<a href="product_link.html" class="block bg-gradient-to-b from-white/10 to-black/30 backdrop-blur-sm rounded-2xl border border-white/10 hover:border-sky-100 hover:shadow-[0_0_15px_rgba(224,242,254,0.3)] transition-all duration-300 overflow-hidden relative group">
				
				<!-- Изображение с эффектом увеличения -->
				<div class="aspect-square flex items-center justify-center p-4 overflow-hidden">
					<img src="ksst.png" alt="Кислота соляная" class="w-full h-full object-contain group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://placehold.co/400x300?text=Нет+фото'">
				</div>

				<!-- Градиент для затемнения нижней части -->
				<div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-black/60 to-transparent"></div>

				<!-- Текст -->
				<div class="p-5 text-center relative z-10">
					<h3 class="font-bold text-lg leading-tight text-white group-hover:text-blue-200 transition-colors">
						Кислота соляная
					</h3>
				</div>
			</a>

			<!-- Карточка 3: Гипохлорит натрия -->
			<a href="product_link_3.html" class="block bg-gradient-to-b from-white/10 to-black/30 backdrop-blur-sm rounded-2xl border border-white/10 hover:border-sky-100 hover:shadow-[0_0_15px_rgba(224,242,254,0.3)] transition-all duration-300 overflow-hidden relative group">
				
				<!-- Изображение с эффектом увеличения -->
				<div class="aspect-square flex items-center justify-center p-4 overflow-hidden">
					<img src="gipohlorit.png" alt="Гипохлорит натрия" class="w-full h-full object-contain group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://placehold.co/400x300?text=Нет+фото'">
				</div>

				<!-- Градиент для текста -->
				<div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-black/60 to-transparent"></div>

				<!-- Текст -->
				<div class="p-5 text-center relative z-10">
					<h3 class="font-bold text-lg leading-tight text-white group-hover:text-blue-200 transition-colors">
						Гипохлорит натрия
					</h3>
				</div>
			</a>
			
			<!-- Карточка 4: Сода -->
			<a href="product_link_4.html" class="block bg-gradient-to-b from-white/10 to-black/30 backdrop-blur-sm rounded-2xl border border-white/10 hover:border-sky-100 hover:shadow-[0_0_15px_rgba(224,242,254,0.3)] transition-all duration-300 overflow-hidden relative group">
				
				<div class="aspect-square flex items-center justify-center p-4 overflow-hidden">
					<img src="soda.png" alt="Сода кальцинированная" class="w-full h-full object-contain group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://placehold.co/400x300?text=Нет+фото'">
				</div>

				<div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-black/60 to-transparent"></div>

				<div class="p-5 text-center relative z-10">
					<h3 class="font-bold text-lg leading-tight text-white group-hover:text-blue-200 transition-colors">
						Сода кальцинированная
					</h3>
				</div>
			</a>

        </div>

        <!-- Кнопка Каталог -->
        <div class="mt-10 sm:mt-12 flex justify-center w-full">
            <a href="catalog.html" class="px-8 sm:px-12 py-4 bg-blue-900 hover:bg-blue-800 text-white font-bold text-lg sm:text-xl rounded-full transition-all shadow-xl border border-blue-700">
                Каталог продукции
            </a>
        </div>
    </main>

    <footer class="text-center p-6 text-gray-600 text-sm border-t border-gray-800">
        &copy; 2026 ООО «Торговый дом Импульс».
    </footer>
</body>
</html>
