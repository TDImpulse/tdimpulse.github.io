<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Торговый дом Импульс | Опт</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Фоновая картинка с фиксированным позиционированием и прозрачностью -->
    <div class="bg-fixed-img"></div>

    <!-- Единая шапка от самого верха -->
    <header class="header-block">
        <div class="header-inner">
            <!-- Левая колонка: контакты -->
            <div class="header-left">
                <div class="contacts">
                    <span class="contact-item">тел: +7 (937) 500-66-95</span>
                    <span class="contact-item">impulse.chem@gmail.com</span>
                </div>
            </div>

            <!-- Центральная колонка: логотип и подзаголовок -->
            <div class="header-center">
                <h1 class="main-title">
                    <img src="logo.png" alt="Торговый дом Импульс" class="main-logo">
                </h1>                
            </div>

            <!-- Правая колонка: кнопка о компании -->
            <div class="header-right">
                <a href="about.html" class="btn-about">О компании</a>
            </div>
        </div>
    </header>

    <!-- Основной контент с карточками -->
    <div class="hero-section">
        <div class="hero-inner">
            <div class="products-grid">
                
                <!-- Карточка 1: Натр едкий -->
                <a href="natrCHTR.html" class="product-card first-product">
                    <div class="product-image-box">
                        <img src="natr.png" alt="Натр едкий чешуированный" class="product-img">
                    </div>
                    <h3 class="product-title">Натр едкий чешуированный</h3>
                </a>
                
                <!-- Карточка 2: Кислота соляная -->
                <a href="natriy_gidro.html" class="product-card">
                    <div class="product-image-box">
                        <img src="ksst.png" alt="Кислота соляная" class="product-img">
                    </div>
                    <h3 class="product-title">Кислота соляная</h3>
                </a>
                
                <!-- Карточка 3: Гипохлорит натрия -->
                <a href="limonnaya.html" class="product-card">
                    <div class="product-image-box">
                        <img src="gipohlorit.png" alt="Гипохлорит натрия" class="product-img">
                    </div>
                    <h3 class="product-title">Гипохлорит натрия</h3>
                </a>
                
                <!-- Карточка 4: Сода кальцинированная -->
                <a href="kisloroda.html" class="product-card">
                    <div class="product-image-box">
                        <img src="soda.png" alt="Сода кальцинированная" class="product-img">
                    </div>
                    <h3 class="product-title">Сода кальцинированная</h3>
                </a>
                
            </div>
            
            <div class="catalog-btn-wrapper">
                <a href="catalog.html" class="btn-catalog">Каталог продукции</a>
            </div>
        </div>
    </div>

    <!-- Футер -->
    <footer class="main-footer">
        <div class="footer-inner">
            <p>© 2026 ООО «Торговый дом Импульс».</p>
        </div>
    </footer>
</body>
</html>
