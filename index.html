<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Торговый дом Импульс | Опт</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col">

    <header class="p-8 border-b border-gray-800">
        <div class="container mx-auto text-center">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">
                Торговый дом Импульс
            </h1>
            <p class="text-lg text-gray-400 mt-4 tracking-wide">Прямые дилеры АО «Росхим» | Крупный опт от 20 тонн</p>
        </div>
    </header>

    <main class="container mx-auto p-6 flex-grow">
        <section class="mb-12 text-center">
            <h2 class="text-2xl font-light text-gray-300">Наши ключевые товары</h2>
        </section>

        <!-- Карточки с добавленными изображениями -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <!-- Карточка 1 -->
            <div class="bg-gray-800/50 backdrop-blur rounded-2xl border border-gray-700 hover:border-blue-500 transition-all duration-300 overflow-hidden group">
                <img src="https://images.unsplash.com/photo-1581092580497-e0d75cbdf152?w=500&h=300&fit=crop" alt="Натр едкий" class="w-full h-40 object-cover opacity-80 group-hover:opacity-100 transition">
                <div class="p-5">
                    <h3 class="font-bold text-lg leading-tight break-words group-hover:text-blue-400 transition">Натр едкий чешуированный</h3>
                </div>
            </div>

            <!-- Карточка 2 -->
            <div class="bg-gray-800/50 backdrop-blur rounded-2xl border border-gray-700 hover:border-blue-500 transition-all duration-300 overflow-hidden group">
                <img src="https://images.unsplash.com/photo-1563770660956-620252579177?w=500&h=300&fit=crop" alt="Кислота" class="w-full h-40 object-cover opacity-80 group-hover:opacity-100 transition">
                <div class="p-5">
                    <h3 class="font-bold text-lg leading-tight break-words group-hover:text-blue-400 transition">Кислота соляная</h3>
                </div>
            </div>

            <!-- Карточка 3 -->
            <div class="bg-gray-800/50 backdrop-blur rounded-2xl border border-gray-700 hover:border-blue-500 transition-all duration-300 overflow-hidden group">
                <img src="https://images.unsplash.com/photo-1627843563095-f6eab1fd753f?w=500&h=300&fit=crop" alt="Химия" class="w-full h-40 object-cover opacity-80 group-hover:opacity-100 transition">
                <div class="p-5">
                    <h3 class="font-bold text-lg leading-tight break-words group-hover:text-blue-400 transition">Гипохлорит кальция</h3>
                </div>
            </div>

            <!-- Карточка 4 -->
            <div class="bg-gray-800/50 backdrop-blur rounded-2xl border border-gray-700 hover:border-blue-500 transition-all duration-300 overflow-hidden group">
                <img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?w=500&h=300&fit=crop" alt="Сода" class="w-full h-40 object-cover opacity-80 group-hover:opacity-100 transition">
                <div class="p-5">
                    <h3 class="font-bold text-lg leading-tight break-words group-hover:text-blue-400 transition">Сода кальцинированная</h3>
                </div>
            </div>

        </div>

        <div class="mt-16 text-center">
            <a href="full-catalog.html" class="inline-block bg-gradient-to-r from-blue-600 to-blue-800 text-white px-10 py-4 rounded-full font-bold text-lg hover:shadow-[0_0_20px_rgba(37,99,235,0.5)] transition-all">
                Перейти к полному каталогу
            </a>
        </div>
    </main>

    <footer class="text-center p-8 text-gray-600 border-t border-gray-800">
        &copy; 2026 ООО «Торговый дом Импульс».
    </footer>

</body>
</html>
